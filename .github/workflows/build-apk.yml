name: Build Calculator APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-cache-dependency-path: ''

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreproducibility-dev libjpeg-dev
        pip3 install --user --upgrade buildozer cython virtualenv

    - name: Configure Buildozer
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
          # C++ সাপোর্ট এবং ক্যালকুলেটর অ্যাপের সেটিংস কনফিগার করা হচ্ছে
          sed -i 's/^title =.*/title = Cpp Calculator/' buildozer.spec
          sed -i 's/^package.name =.*/package.name = cppcalculator/' buildozer.spec
          sed -i 's/^source.include_exts =.*/source.include_exts = py,png,jpg,kv,atlas,cpp,h,hpp/' buildozer.spec
          sed -i 's/#requirements =.*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/#android.archs =.*/android.archs = arm64-v8a/' buildozer.spec
          sed -i 's/#android.accept_sdk_license =.*/android.accept_sdk_license = False/' buildozer.spec
        fi

    - name: Build APK with Buildozer
      run: |
        # অটোমেটিক লাইসেন্স অ্যাকসেপ্ট করার জন্য এনভায়রনমেন্ট সেটআপ
        yes | buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-Android-APK
        path: bin/*.apk
        
