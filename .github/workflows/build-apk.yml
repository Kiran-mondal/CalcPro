name: Android Qt Cpp Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Qt and Android SDK
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3' # স্থিতিশীল Qt ভার্সন
        target: 'android'
        arch: 'android_arm64_v8a'

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Build APK with CMake
      run: |
        mkdir build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-26 \
              ..
        make

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-Android-APK
        path: build/**/*.apk
        
